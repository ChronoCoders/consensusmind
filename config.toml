[llm] 
endpoint = "http://localhost:8000/v1" 
api_key = "" 
model = "deepseek-r1" 
max_tokens = 4096 
temperature = 0.7 
 
[paths] 
papers = "data/papers" 
embeddings = "data/embeddings" 
experiments = "data/experiments" 
output = "output" 
 
[agent] 
max_iterations = 10 
timeout_seconds = 300 
memory_file = "data/agent_memory.json"
history_limit = 50
download_limit = 3
top_k = 5
 
[logging] 
level = "info" 
file = "consensusmind.log" 

[knowledge]
max_pdf_bytes = 104857600
metadata_file = "data/metadata.json"
embedding_dims = 512
index_file = "data/embeddings/index.json"
