[graph]
targets = []
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
ignore = []
unmaintained = "workspace"
unsound = "workspace"
yanked = "warn"

[licenses]
allow = ["Apache-2.0", "MIT", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0", "CC0-1.0"]
deny = []
copyleft = "deny"
default = "deny"
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
